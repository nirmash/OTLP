<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTLP Receiver</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --fg: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --orange: #d29922; --purple: #bc8cff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .controls { display: flex; gap: .5rem; margin-left: auto; }
    button { background: var(--card); color: var(--fg); border: 1px solid var(--border); padding: .4rem .8rem; border-radius: 6px; cursor: pointer; font-size: .85rem; }
    button:hover { border-color: var(--accent); }
    button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .stats { display: flex; gap: 1.5rem; padding: 1rem 2rem; border-bottom: 1px solid var(--border); }
    .stat { display: flex; align-items: baseline; gap: .4rem; }
    .stat .label { color: var(--muted); font-size: .8rem; text-transform: uppercase; }
    .stat .value { font-size: 1.1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .stat.traces .value { color: var(--accent); }
    .stat.metrics .value { color: var(--green); }
    .stat.logs .value { color: var(--orange); }
    main { padding: 1.5rem 2rem; }
    .items { display: flex; flex-direction: column; gap: .75rem; }
    .item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .item-header { padding: .6rem 1rem; display: flex; justify-content: space-between; align-items: center; font-size: .8rem; color: var(--muted); cursor: pointer; }
    .item-header:hover { background: #1c2128; }
    .item-body { display: none; padding: .75rem 1rem; border-top: 1px solid var(--border); }
    .item-body.open { display: block; }
    pre { background: var(--bg); padding: .75rem; border-radius: 6px; overflow-x: auto; font-size: .78rem; line-height: 1.5; color: var(--purple); white-space: pre-wrap; word-break: break-all; }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty p { margin-top: .5rem; font-size: .85rem; }
    .badge { display: inline-block; padding: .1rem .4rem; border-radius: 4px; font-size: .7rem; font-weight: 600; }
    .badge.trace { background: rgba(88,166,255,.15); color: var(--accent); }
    .badge.metric { background: rgba(63,185,80,.15); color: var(--green); }
    .badge.log { background: rgba(210,153,34,.15); color: var(--orange); }
  </style>
</head>
<body>
  <header>
    <h1><span>OTLP</span> Receiver</h1>
    <div class="controls">
      <button id="btn-traces" class="active" onclick="switchKind('traces')">Traces</button>
      <button id="btn-metrics" onclick="switchKind('metrics')">Metrics</button>
      <button id="btn-logs" onclick="switchKind('logs')">Logs</button>
      <button onclick="clearAll()">Clear</button>
    </div>
  </header>
  <div class="stats">
    <div class="stat traces"><span class="label">Traces</span><span class="value" id="cnt-traces">0</span></div>
    <div class="stat metrics"><span class="label">Metrics</span><span class="value" id="cnt-metrics">0</span></div>
    <div class="stat logs"><span class="label">Logs</span><span class="value" id="cnt-logs">0</span></div>
  </div>
  <main>
    <div class="items" id="items"></div>
  </main>

<script>
let currentKind = 'traces';
const kindBadge = { traces: 'trace', metrics: 'metric', logs: 'log' };

function switchKind(k) {
  currentKind = k;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + k).classList.add('active');
  refresh();
}

function resourceName(data) {
  const attrs = data?.resource?.attributes || [];
  const svc = attrs.find(a => a.key === 'service.name');
  return svc ? (svc.value?.stringValue || svc.value?.string_value || 'unknown') : 'unknown';
}

function spanSummary(data) {
  const scopes = data?.scope_spans || data?.scopeSpans || [];
  let count = 0;
  let names = [];
  for (const s of scopes) {
    const spans = s.spans || [];
    count += spans.length;
    for (const sp of spans.slice(0, 3)) names.push(sp.name);
  }
  return `${count} span(s)` + (names.length ? ': ' + names.join(', ') : '');
}

function metricSummary(data) {
  const scopes = data?.scope_metrics || data?.scopeMetrics || [];
  let names = [];
  for (const s of scopes) {
    for (const m of (s.metrics || []).slice(0, 5)) names.push(m.name);
  }
  return names.length ? names.join(', ') : 'metrics data';
}

function logSummary(data) {
  const scopes = data?.scope_logs || data?.scopeLogs || [];
  let count = 0;
  for (const s of scopes) count += (s.log_records || s.logRecords || []).length;
  return `${count} log record(s)`;
}

function summarize(kind, data) {
  if (kind === 'traces') return spanSummary(data);
  if (kind === 'metrics') return metricSummary(data);
  return logSummary(data);
}

function renderItems(items) {
  const el = document.getElementById('items');
  if (!items.length) {
    el.innerHTML = '<div class="empty"><h2>No ' + currentKind + ' received yet</h2><p>Send OTLP data to POST /v1/' + currentKind + '</p></div>';
    return;
  }
  el.innerHTML = items.reverse().map((item, i) => {
    const svc = resourceName(item.data);
    const summary = summarize(currentKind, item.data);
    return `<div class="item">
      <div class="item-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span><span class="badge ${kindBadge[currentKind]}">${currentKind.slice(0,-1)}</span> &nbsp;${svc} — ${summary}</span>
        <span>${item.received_at}</span>
      </div>
      <div class="item-body"><pre>${JSON.stringify(item.data, null, 2)}</pre></div>
    </div>`;
  }).join('');
}

async function refresh() {
  const [telResp, statsResp] = await Promise.all([
    fetch('/api/telemetry?kind=' + currentKind + '&limit=100'),
    fetch('/api/stats'),
  ]);
  const tel = await telResp.json();
  const stats = await statsResp.json();
  document.getElementById('cnt-traces').textContent = stats.traces;
  document.getElementById('cnt-metrics').textContent = stats.metrics;
  document.getElementById('cnt-logs').textContent = stats.logs;
  renderItems(tel.items);
}

async function clearAll() {
  await fetch('/api/clear', { method: 'POST' });
  refresh();
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
